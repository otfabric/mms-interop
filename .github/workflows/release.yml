name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub release
  packages: write   # push to GHCR

jobs:
  release:
    name: Build, push and release
    runs-on: ubuntu-latest

    outputs:
      libiec61850-digest:  ${{ steps.push-libiec61850.outputs.digest }}
      iec61850bean-digest: ${{ steps.push-iec61850bean.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate fixtures before release
        run: python3 scripts/validate-fixtures.py

      - name: Set up QEMU (multi-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive version and semver tag variants from the pushed tag.
      # v0.2.0  →  v0.2.0, v0.2, v0, latest
      - name: Compute image tags — libiec61850
        id: meta-libiec61850
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/otfabric/mms-interop-libiec61850
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Compute image tags — iec61850bean
        id: meta-iec61850bean
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/otfabric/mms-interop-iec61850bean
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push libiec61850 (linux/amd64, linux/arm64)
        id: push-libiec61850
        uses: docker/build-push-action@v6
        with:
          context: .
          file: adapters/libiec61850/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            ADAPTER_VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta-libiec61850.outputs.tags }}
          labels: ${{ steps.meta-libiec61850.outputs.labels }}

      - name: Build and push iec61850bean (linux/amd64, linux/arm64)
        id: push-iec61850bean
        uses: docker/build-push-action@v6
        with:
          context: .
          file: adapters/iec61850bean/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            ADAPTER_VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta-iec61850bean.outputs.tags }}
          labels: ${{ steps.meta-iec61850bean.outputs.labels }}

      # Generate a machine-readable release manifest.
      - name: Generate manifest.json
        run: |
          LIBIEC61850_SHA=$(grep 'LIBIEC61850_SHA=' adapters/libiec61850/Dockerfile \
            | head -1 | cut -d= -f2)
          IEC61850BEAN_VERSION=$(grep -oP '(?<=<version>)[^<]+' \
            adapters/iec61850bean/pom.xml | head -1 || echo "1.9.0")

          cat > manifest.json <<EOF
          {
            "version": "${{ github.ref_name }}",
            "fixture": "iec61850-v1",
            "libiec61850": "${LIBIEC61850_SHA}",
            "iec61850bean": "${IEC61850BEAN_VERSION}",
            "images": {
              "libiec61850":  "${{ steps.push-libiec61850.outputs.digest }}",
              "iec61850bean": "${{ steps.push-iec61850bean.outputs.digest }}"
            }
          }
          EOF
          cat manifest.json

      - name: Generate checksums.txt
        run: |
          sha256sum manifest.json > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Adapter images

            | Image | Digest |
            |-------|--------|
            | `ghcr.io/otfabric/mms-interop-libiec61850:${{ github.ref_name }}` | `${{ steps.push-libiec61850.outputs.digest }}` |
            | `ghcr.io/otfabric/mms-interop-iec61850bean:${{ github.ref_name }}` | `${{ steps.push-iec61850bean.outputs.digest }}` |

            ## Pinning in consumer repositories

            ```bash
            LIBIEC61850_IMAGE=ghcr.io/otfabric/mms-interop-libiec61850@${{ steps.push-libiec61850.outputs.digest }}
            IEC61850BEAN_IMAGE=ghcr.io/otfabric/mms-interop-iec61850bean@${{ steps.push-iec61850bean.outputs.digest }}
            ```

            See `manifest.json` for full provenance (libiec61850 commit SHA, iec61850bean version, fixture revision).
          files: |
            manifest.json
            checksums.txt
