# Manual debugging compose file.
#
# This file is for interactive inspection only.  Go tests manage the full
# adapter lifecycle themselves (REQ-7.1); do not use this file in CI.
#
# Start the libiec61850 MMS server on host port 1102:
#   make build
#   docker compose --profile libiec61850 up -d
#
# Connect with a raw MMS client:
#   nc -z localhost 1102 && echo "port open"

name: mms-interop

services:
  libiec61850-mms-server:
    profiles: ["libiec61850"]
    build:
      context: .
      dockerfile: adapters/libiec61850/Dockerfile
      platforms:
        - linux/amd64
    image: mms-interop-libiec61850:local
    platform: linux/amd64
    environment:
      MMS_INTEROP_ADDRESS: "0.0.0.0"
      MMS_INTEROP_PORT: "102"
    ports:
      - "1102:1102"
    volumes:
      - ./fixtures/mms:/fixtures/mms:ro
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/102"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 10s
    command:
      - "--fixture"
      - "/fixtures/mms/interop.json"
      - "--port"
      - "1102"
